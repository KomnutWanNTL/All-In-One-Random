<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All-In-One Random · ระบบสุ่มข้อมูล</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header / Hero -->
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-icon"><i class="bi bi-shuffle"></i></span>
                <div>
                    <div class="brand-title">All-In-One Random</div>
                    <div class="brand-subtitle">ระบบสุ่มข้อมูลจำลอง</div>
                </div>
            </div>
            <div class="header-actions">
                <button id="random-btn" class="btn-generate" aria-label="สุ่มข้อมูลใหม่">
                    <i class="bi bi-arrow-repeat"></i>
                    <span>สุ่มใหม่</span>
                </button>
                <button id="theme-toggle" class="btn-icon" title="สลับธีม" aria-label="Toggle theme">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
        <div id="display-data" class="cards-grid"></div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <span>ข้อมูลทั้งหมดเป็นข้อมูลจำลอง ไม่ใช่ข้อมูลจริง</span>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
