<!-- ไฟล์ index.html -->
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Data</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-body-tertiary">
    <div class="container py-5">
        <h2 class="text-center mb-4 text-primary fw-bold">ระบบสุ่มข้อมูล (All-In-One Random)</h2>
        <div class="text-center mb-5">
            <button class="btn btn-primary btn-lg shadow-sm px-4 py-2" onclick="displayRandomData()">
                <i class="bi bi-arrow-repeat me-2"></i>สุ่มข้อมูลใหม่
            </button>
        </div>
        <!-- Display Area for Cards -->
        <div id="display-data" class="row g-4 justify-content-center"></div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
